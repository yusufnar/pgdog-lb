version: "3.9"

services:
  pg-primary:
    image: postgres:17
    container_name: pg-primary
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: appdb
    volumes:
      - pg-primary-data:/var/lib/postgresql/data
      - ./pg-primary/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./pg-primary/01_hba.sh:/docker-entrypoint-initdb.d/01_hba.sh
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    ports:
      - "5432:5432"

  pg-replica1:
    image: postgres:17
    container_name: pg-replica1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      PGPASSWORD: secret        # For pg_basebackup authentication
      REP_USER: replica        # Replication user (created in init.sql)
      REPLICATION_SLOT: pg_replica1
    volumes:
      - pg-replica1-data:/var/lib/postgresql/data
      - ./replica/init_replica.sh:/init_replica.sh
    entrypoint: ["/init_replica.sh"]
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    depends_on:
      - pg-primary

  pg-replica2:
    image: postgres:17
    container_name: pg-replica2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      PGPASSWORD: secret
      REP_USER: replica
      REPLICATION_SLOT: pg_replica2
    volumes:
      - pg-replica2-data:/var/lib/postgresql/data
      - ./replica/init_replica.sh:/init_replica.sh
    entrypoint: ["/init_replica.sh"]
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    depends_on:
      - pg-primary

  pgdog-read:
    build:
      context: ./pgdog
      dockerfile: Dockerfile
    container_name: pgdog-read
    ports:
      - "6432:6432"
      - "9930:9930"
    depends_on:
      - pg-primary
      - pg-replica1
      - pg-replica2

  exporter-primary:
    image: prometheuscommunity/postgres-exporter
    container_name: exporter-primary
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:secret@pg-primary:5432/appdb?sslmode=disable"
      PG_EXPORTER_EXTEND_QUERY_PATH: "/queries.yml"
    volumes:
      - ./postgres-exporter/queries.yml:/queries.yml
    depends_on:
      - pg-primary

  exporter-replica1:
    image: prometheuscommunity/postgres-exporter
    container_name: exporter-replica1
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:secret@pg-replica1:5432/appdb?sslmode=disable"
      PG_EXPORTER_EXTEND_QUERY_PATH: "/queries.yml"
    volumes:
      - ./postgres-exporter/queries.yml:/queries.yml
    depends_on:
      - pg-replica1

  exporter-replica2:
    image: prometheuscommunity/postgres-exporter
    container_name: exporter-replica2
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:secret@pg-replica2:5432/appdb?sslmode=disable"
      PG_EXPORTER_EXTEND_QUERY_PATH: "/queries.yml"
    volumes:
      - ./postgres-exporter/queries.yml:/queries.yml
    depends_on:
      - pg-replica2

  pi-exporter-primary:
    image: andriik/postgres-performance-insights-exporter:latest
    container_name: pi-exporter-primary
    environment:
      - DB_HOST=pg-primary
      - DB_PORT=5432
      - DB_NAME=appdb
      - DB_USER=postgres
      - DB_PASSWORD=secret
    depends_on:
      - pg-primary

  pi-exporter-replica1:
    image: andriik/postgres-performance-insights-exporter:latest
    container_name: pi-exporter-replica1
    environment:
      - DB_HOST=pg-replica1
      - DB_PORT=5432
      - DB_NAME=appdb
      - DB_USER=postgres
      - DB_PASSWORD=secret
    depends_on:
      - pg-replica1

  pi-exporter-replica2:
    image: andriik/postgres-performance-insights-exporter:latest
    container_name: pi-exporter-replica2
    environment:
      - DB_HOST=pg-replica2
      - DB_PORT=5432
      - DB_NAME=appdb
      - DB_USER=postgres
      - DB_PASSWORD=secret
    depends_on:
      - pg-replica2

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - exporter-primary
      - exporter-replica1
      - exporter-replica2

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  pg-primary-data:
  pg-replica1-data:
  pg-replica2-data:
